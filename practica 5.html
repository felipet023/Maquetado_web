<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <ul>
<!-- La etiqueta <ul> significa “unordered list” (lista no ordenada).
Se utiliza cuando el orden de los elementos no es importante. -->
        <li>Elemento 1</li>
        <li>Elemento 2</li>
        <li>Elemento 3</li>
<!-- La etiqueta <li> significa “list item” (elemento de lista).
Se usa dentro de <ul> para representar cada elemento de la lista. -->
    </ul>

</body>
</html>
