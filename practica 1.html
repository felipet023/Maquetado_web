<!DOCTYPE html>
<!--Indica al navegador que el documento está escrito en HTML5.
Sirve para que el navegador interprete correctamente el código 
y no tenga errores de compatibilidad.-->

<html lang="en">
<!-- Es la etiqueta principal que envuelve todo el contenido de la página web.
lang="en" indica que el idioma del contenido es inglés (puedes cambiarlo a "es" si está en español). -->

<head>
    <!-- Contiene información interna del documento (no visible directamente en la página).
Aquí se configuran cosas como el título, codificación, estilos, etc. -->

    <meta charset="UTF-8">
    <!-- Define la codificación de caracteres.
UTF-8 permite usar tildes, ñ, símbolos, etc. sin problemas. -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Hace que la página sea responsive (se adapte a celulares, tablets, etc.).
width=device-width: ajusta el ancho al dispositivo
initial-scale=1.0: define el nivel de zoom inicial -->

    <title>Document</title>
    <!-- Define el título de la página, el que aparece en la pestaña del navegador. -->
     
</head>
<body>
    <!-- Aquí va todo el contenido visible de la página web: texto, imágenes, botones, etc. -->
    
</body>
</html>
